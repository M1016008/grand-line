# Manual discovery smoke test for new Bandai sets.
#
# Production discovery now runs on the local workstation so the attached SSD
# database is updated directly. GitHub Actions cannot access that disk, so this
# workflow writes only to an ephemeral local DB when run manually.
#
# Behaviour: re-fetches the cardlist root, parses the dropdown, finds
# any seriesId not already in SERIES_PARAM ∪ scrape_targets, persists
# the new entries to scrape_targets, and immediately scrapes each one
# so the cards land in the DB without a second manual step.
#
# Manual run: Actions -> "Discover new sets" -> "Run workflow".

name: Discover new sets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only print the diff; don't write to DB"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: discover-new-sets
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRAND_LINE_DATABASE_MODE: local
      LOCAL_DB_PATH: ./data/grand-line-ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Prepare local DB
        run: npm run db:migrate

      - name: Discover and scrape
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run scrape:discover -- --dry-run
          else
            npm run scrape:discover
          fi
