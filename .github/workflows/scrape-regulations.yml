# Weekly refresh of Bandai's banned/restricted card list.
#
# The reconciliation logic in `run-regulations.ts` is idempotent: it
# carries forward unchanged rows, opens new ones with effective_from =
# today, and closes removed ones with effective_until = today. So this
# job is safe to run repeatedly.
#
# Schedule: Mondays at 00:00 UTC = 09:00 JST. Picks up overnight
# changes Bandai typically pushes early in the week.
#
# Required repo secrets:
#   TURSO_DATABASE_URL  — libsql://onepiece-tcg-<org>.turso.io
#   TURSO_AUTH_TOKEN    — group token from `turso group tokens create default`
#
# Manual run: Actions → "Scrape regulations" → "Run workflow".

name: Scrape regulations

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape-regulations
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Verify required secrets
        run: |
          if [ -z "${TURSO_DATABASE_URL:-}" ] || [ -z "${TURSO_AUTH_TOKEN:-}" ]; then
            echo "::error::TURSO_DATABASE_URL and TURSO_AUTH_TOKEN must be set as repo secrets"
            exit 1
          fi

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape and reconcile
        run: npm run scrape:regulations
