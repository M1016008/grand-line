# Manual smoke test for Bandai's banned/restricted card list.
#
# The reconciliation logic in `run-regulations.ts` is idempotent: it
# carries forward unchanged rows, opens new ones with effective_from =
# today, and closes removed ones with effective_until = today. So this
# job is safe to run repeatedly.
#
# Production refreshes now run on the local workstation so the attached SSD
# database is updated directly. GitHub Actions cannot access that disk, so this
# workflow writes only to an ephemeral local DB when run manually.
#
# Manual run: Actions -> "Scrape regulations" -> "Run workflow".

name: Scrape regulations

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape-regulations
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GRAND_LINE_DATABASE_MODE: local
      LOCAL_DB_PATH: ./data/grand-line-ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Prepare local DB
        run: npm run db:migrate

      - name: Scrape and reconcile
        run: npm run scrape:regulations
