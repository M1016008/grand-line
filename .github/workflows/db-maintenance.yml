# Manual local database maintenance smoke test.
#
# Practice replay events are intentionally the only aggressively pruned data:
# card facts, scrape history, and regulation history remain durable, while old
# full replay event streams are reduced to compact game summaries.
#
# Production maintenance now runs on the local workstation against the attached
# SSD database. GitHub Actions cannot access that disk, so this workflow writes
# only to an ephemeral local DB when run manually.
#
# Manual run: Actions -> "DB maintenance" -> "Run workflow".

name: DB maintenance

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print rows that would be deleted without deleting"
        type: boolean
        default: false
      event_days:
        description: "Delete full practice event streams older than this many days"
        type: number
        default: 14
      run_days:
        description: "Delete whole practice runs older than this many days"
        type: number
        default: 90
      keep_runs:
        description: "Always keep at least this many recent practice runs"
        type: number
        default: 50
      vacuum:
        description: "Run VACUUM after pruning to compact free pages"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: db-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GRAND_LINE_DATABASE_MODE: local
      LOCAL_DB_PATH: ./data/grand-line-ci.db
      DRY_RUN: ${{ inputs.dry_run || false }}
      EVENT_DAYS: ${{ inputs.event_days || 14 }}
      RUN_DAYS: ${{ inputs.run_days || 90 }}
      KEEP_RUNS: ${{ inputs.keep_runs || 50 }}
      VACUUM: ${{ inputs.vacuum || false }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Prepare local DB
        run: npm run db:migrate

      - name: Prune practice storage
        run: |
          args=(--event-days "$EVENT_DAYS" --run-days "$RUN_DAYS" --keep-runs "$KEEP_RUNS")

          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi

          if [ "$VACUUM" = "true" ]; then
            args+=(--vacuum)
          fi

          npm run db:prune:practice -- "${args[@]}"
