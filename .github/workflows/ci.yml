# CI for every push to main and every pull request.
#
# Runs the four checks the human runs locally before each commit:
# typecheck, lint, build, unit tests. The build uses an ephemeral local
# SQLite/libSQL file because GitHub Actions cannot access the attached SSD.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GRAND_LINE_DATABASE_MODE: local
      LOCAL_DB_PATH: ./data/grand-line-ci.db
      TURSO_DATABASE_URL: ""
      TURSO_AUTH_TOKEN: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: prepare local DB
        run: npm run db:migrate

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: unit tests
        run: npm test

      - name: build
        run: npm run build
