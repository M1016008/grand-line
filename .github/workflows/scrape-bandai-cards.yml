# Manual scraper smoke test for Bandai JP card data.
#
# Production refreshes now run on the local workstation so the attached SSD
# database is updated directly. GitHub Actions cannot access that disk, so this
# workflow writes only to an ephemeral local DB when run manually.
#
# Manual run: Actions -> "Scrape Bandai cards" -> "Run workflow".

name: Scrape Bandai cards

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        default: "discover-and-full-refresh"
        options:
          - "discover-and-full-refresh"
          - "discover-only"
          - "full-refresh-only"
      set_codes:
        description: "Optional comma-separated set codes for the full refresh step, e.g. OP15,PRB02"
        type: string
        required: false
        default: ""
      dry_run:
        description: "Parse only during the full refresh step; don't write cards to DB"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: scrape-bandai-cards
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GRAND_LINE_DATABASE_MODE: local
      LOCAL_DB_PATH: ./data/grand-line-ci.db
      RUN_MODE: ${{ inputs.mode || 'discover-and-full-refresh' }}
      SET_CODES: ${{ inputs.set_codes || '' }}
      DRY_RUN: ${{ inputs.dry_run || false }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Prepare local DB
        run: npm run db:migrate

      - name: Discover new sets
        if: env.RUN_MODE != 'full-refresh-only'
        run: npm run scrape:discover

      - name: Refresh known card sets
        if: env.RUN_MODE != 'discover-only'
        run: |
          args=(--delay-ms 8000)

          if [ -n "${SET_CODES:-}" ]; then
            args+=(--only "$SET_CODES")
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi

          npm run scrape:bandai-jp:all -- "${args[@]}"
